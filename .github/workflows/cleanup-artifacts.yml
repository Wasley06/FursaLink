name: Cleanup Actions Artifacts

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: {}

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old artifacts (older than 1 day)
        uses: actions/github-script@v7
        with:
          script: |
            const cutoffMs = Date.now() - 24 * 60 * 60 * 1000;
            const perPage = 100;
            let page = 1;
            let deleted = 0;
            while (true) {
              const { data } = await github.rest.actions.listArtifactsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: perPage,
                page,
              });
              const artifacts = data.artifacts || [];
              for (const a of artifacts) {
                const created = new Date(a.created_at).getTime();
                if (created < cutoffMs) {
                  try {
                    await github.rest.actions.deleteArtifact({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      artifact_id: a.id,
                    });
                    deleted++;
                  } catch (e) {
                    core.warning(`Failed to delete artifact ${a.id}: ${e.message || e}`);
                  }
                }
              }
              if (!data.total_count || artifacts.length < perPage) break;
              page++;
            }
            core.info(`Deleted ${deleted} old artifacts.`);

