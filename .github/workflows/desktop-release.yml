name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Cleanup existing release assets (tag builds)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            core.info(`Checking release assets for tag ${tag}...`);
            let release;
            try {
              const res = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              release = res.data;
            } catch (e) {
              core.info(`No release found for ${tag} (ok).`);
              return;
            }
            const assets = release.assets || [];
            if (!assets.length) {
              core.info('No assets to delete.');
              return;
            }
            for (const a of assets) {
              core.info(`Deleting asset: ${a.name} (${a.id})`);
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: a.id,
              });
            }
            core.info(`Deleted ${assets.length} assets for ${tag}.`);

      - name: Install deps
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Build installers (Windows)
        if: matrix.os == 'windows-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish always

      - name: Build installers (macOS)
        if: matrix.os == 'macos-latest'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --x64 --arm64 --publish always
